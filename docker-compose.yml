version: "3.8"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: tbm
      POSTGRES_PASSWORD: tbm_dev_password
      POSTGRES_DB: tbm_evaluator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://tbm:tbm_dev_password@db:5432/tbm_evaluator
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ADMIN_API_KEY: dev-admin-key
      BASE_URL: http://localhost:8000
      LOG_LEVEL: INFO
    depends_on:
      - db

volumes:
  pgdata:
