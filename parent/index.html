<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parent Portal — TBM Evaluator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --teal: #09A1A1;
    --teal-dark: #078585;
    --teal-light: #e6f7f7;
    --steel: #5484A4;
    --coral: #FA6E82;
    --gold: #F6C992;
    --blue-gray: #ACC0D3;
    --rose: #D396A6;
    --bg: #f4f6fa;
    --card-bg: #ffffff;
    --text-primary: #1a2332;
    --text-secondary: #5f6d7e;
    --text-muted: #94a3b8;
    --border: #e8ecf1;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
    --shadow-card: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-lg: 0 8px 30px rgba(0,0,0,0.10);
    --radius-card: 12px;
    --radius-btn: 8px;
    --radius-input: 6px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Login Background ── */
  .login-bg {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: linear-gradient(135deg, #f0f9f9 0%, #f4f6fa 40%, #faf5f6 100%);
    position: relative;
    overflow: hidden;
  }
  .login-bg::before {
    content: '';
    position: absolute;
    top: -200px;
    right: -200px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(9,161,161,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .login-bg::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -150px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(250,110,130,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Login Card ── */
  .login-card {
    background: var(--card-bg);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-lg);
    padding: 48px 40px 40px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .brand-logo {
    width: 64px;
    height: 64px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--steel) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    color: #fff;
  }
  .brand-logo svg { width: 32px; height: 32px; }

  .brand-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .brand-subtitle {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 36px;
  }

  .input-group {
    position: relative;
    margin-bottom: 16px;
  }
  .input-group .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  .input-group .input-icon svg { width: 18px; height: 18px; }
  .input-group input {
    width: 100%;
    padding: 14px 16px 14px 44px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-input);
    font-size: 15px;
    font-family: inherit;
    color: var(--text-primary);
    outline: none;
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-group input::placeholder { color: var(--text-muted); }
  .input-group input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(9,161,161,0.10);
  }

  .btn-primary {
    width: 100%;
    padding: 14px 24px;
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: var(--radius-btn);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  }
  .btn-primary:hover { background: var(--teal-dark); box-shadow: 0 4px 14px rgba(9,161,161,0.25); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-primary svg { width: 18px; height: 18px; }

  .login-error {
    margin-top: 16px;
    padding: 12px 16px;
    background: #fff5f6;
    border: 1px solid #fde2e6;
    border-radius: var(--radius-input);
    color: var(--coral);
    font-size: 13px;
    font-weight: 500;
    display: none;
    align-items: center;
    gap: 8px;
  }
  .login-error.visible { display: flex; }
  .login-error svg { width: 16px; height: 16px; flex-shrink: 0; }

  .login-footer {
    margin-top: 32px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ── Spinner ── */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Results View ── */
  .results-view {
    display: none;
    min-height: 100vh;
    background: var(--bg);
  }

  .results-header {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .back-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-btn);
    border: 1.5px solid var(--border);
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { border-color: var(--teal); color: var(--teal); }
  .back-btn svg { width: 18px; height: 18px; }

  .header-text h2 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
  }
  .header-text p {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .results-body {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  /* ── Player Group ── */
  .player-group {
    margin-bottom: 32px;
  }
  .player-group-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 12px;
    padding-left: 4px;
  }

  /* ── Player Card ── */
  .player-card {
    background: var(--card-bg);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow-card);
    padding: 24px;
    margin-bottom: 16px;
    transition: box-shadow 0.2s, transform 0.15s;
    border: 1px solid rgba(0,0,0,0.03);
  }
  .player-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.09);
    transform: translateY(-1px);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 20px;
  }

  .avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--teal) 0%, var(--steel) 100%);
    overflow: hidden;
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .card-info { flex: 1; min-width: 0; }

  .player-name {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .badges {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    line-height: 1.4;
  }
  .badge svg { width: 12px; height: 12px; }
  .badge-position { background: #eef6fb; color: var(--steel); }
  .badge-age { background: #fef6ee; color: #b87a3d; }
  .badge-rank { background: #f0faf5; color: #2d8a5e; }

  /* ── Score Gauge ── */
  .score-area {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .score-ring {
    position: relative;
    width: 64px;
    height: 64px;
  }
  .score-ring svg {
    width: 64px;
    height: 64px;
    transform: rotate(-90deg);
  }
  .score-ring .bg-ring {
    fill: none;
    stroke: #f0f2f5;
    stroke-width: 5;
  }
  .score-ring .fg-ring {
    fill: none;
    stroke-width: 5;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.8s ease;
  }
  .score-value {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .score-number {
    font-size: 17px;
    font-weight: 800;
    line-height: 1;
  }
  .score-label {
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ── Event Row ── */
  .event-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .event-info {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 13px;
    min-width: 0;
  }
  .event-info svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--blue-gray); }
  .event-name { font-weight: 600; color: var(--text-primary); }
  .event-date { color: var(--text-muted); font-size: 12px; }

  .view-report-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--teal-light);
    color: var(--teal);
    border-radius: var(--radius-btn);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .view-report-btn:hover { background: var(--teal); color: #fff; }
  .view-report-btn svg { width: 14px; height: 14px; }

  /* ── Trend Line ── */
  .trend-section {
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .trend-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .trend-track {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    height: 32px;
  }
  .trend-line {
    flex: 1;
    height: 2px;
    background: var(--border);
    position: relative;
  }
  .trend-dot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    z-index: 1;
  }
  .trend-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2.5px solid var(--teal);
    background: #fff;
    transition: all 0.2s;
  }
  .trend-dot.filled { background: var(--teal); }
  .trend-dot-label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-secondary);
    position: absolute;
    top: 100%;
    margin-top: 4px;
    white-space: nowrap;
  }

  /* ── Empty State ── */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
  }
  .empty-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: #f4f6fa;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    color: var(--blue-gray);
  }
  .empty-icon svg { width: 32px; height: 32px; }
  .empty-state h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .empty-state p {
    font-size: 14px;
    color: var(--text-muted);
    max-width: 320px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ── Transitions ── */
  .fade-in {
    animation: fadeIn 0.35s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-out {
    animation: fadeOut 0.2s ease forwards;
  }
  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
  }

  /* ── Loading overlay for results ── */
  .results-loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    gap: 16px;
  }
  .results-loading .spinner-lg {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  .results-loading p {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .login-card { padding: 36px 24px 32px; margin: 0 4px; }
    .results-body { padding: 16px 12px 48px; }
    .player-card { padding: 20px 16px; }
    .card-top { gap: 12px; }
    .avatar { width: 48px; height: 48px; font-size: 17px; }
    .player-name { font-size: 16px; }
    .score-ring { width: 56px; height: 56px; }
    .score-ring svg { width: 56px; height: 56px; }
    .score-number { font-size: 15px; }
    .event-row { flex-direction: column; align-items: flex-start; }
    .view-report-btn { width: 100%; justify-content: center; }
    .results-header { padding: 14px 16px; }
  }
</style>
</head>
<body>

<!-- ════════ LOGIN SCREEN ════════ -->
<div id="loginView" class="login-bg">
  <div class="login-card fade-in">
    <div class="brand-logo">
      <i data-lucide="trophy"></i>
    </div>
    <div class="brand-title">Tiny But Mighty</div>
    <div class="brand-subtitle">Parent Portal</div>

    <div class="input-group">
      <span class="input-icon"><i data-lucide="search"></i></span>
      <input
        type="email"
        id="emailInput"
        placeholder="Enter your email address"
        autocomplete="email"
        onkeydown="if(event.key==='Enter')handleLookup()"
      >
    </div>

    <button class="btn-primary" id="lookupBtn" onclick="handleLookup()">
      <i data-lucide="arrow-right"></i>
      <span>View Reports</span>
    </button>

    <div class="login-error" id="loginError">
      <i data-lucide="alert-circle"></i>
      <span id="loginErrorMsg"></span>
    </div>

    <div class="login-footer">
      Use the email you registered with during tryouts.
    </div>
  </div>
</div>

<!-- ════════ RESULTS SCREEN ════════ -->
<div id="resultsView" class="results-view">
  <div class="results-header">
    <button class="back-btn" onclick="showLogin()" title="Back to login">
      <i data-lucide="arrow-left"></i>
    </button>
    <div class="header-text">
      <h2 id="welcomeText">Welcome back</h2>
      <p id="reportCount"></p>
    </div>
  </div>
  <div class="results-body" id="resultsBody">
    <!-- Populated by JS -->
  </div>

  <!-- ═══ PARENT: TRAINING PROGRAMS ═══ -->
  <div id="parentProgramsSection" style="display:none;margin-top:24px;">
    <h3 style="color:#333;font-size:18px;font-weight:700;margin:0 0 12px;padding:0 20px;display:flex;align-items:center;gap:8px;">
      <i data-lucide="dumbbell" style="width:20px;height:20px;color:#09A1A1;"></i> Training Programs
    </h3>
    <div id="parentProgramsList" style="padding:0 20px;"></div>
  </div>

  <!-- ═══ PARENT: MESSAGES ═══ -->
  <div id="parentMessagesSection" style="display:none;margin-top:24px;">
    <h3 style="color:#333;font-size:18px;font-weight:700;margin:0 0 12px;padding:0 20px;display:flex;align-items:center;gap:8px;">
      <i data-lucide="message-circle" style="width:20px;height:20px;color:#09A1A1;"></i> Messages
    </h3>
    <div id="parentMessagesList" style="padding:0 20px;"></div>
  </div>

  <!-- ═══ PARENT: VIDEOS ═══ -->
  <div id="parentVideosSection" style="display:none;margin-top:24px;">
    <h3 style="color:#333;font-size:18px;font-weight:700;margin:0 0 12px;padding:0 20px;display:flex;align-items:center;gap:8px;">
      <i data-lucide="video" style="width:20px;height:20px;color:#09A1A1;"></i> Player Videos
    </h3>
    <div id="parentVideosList" style="padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;"></div>
  </div>
</div>

<script>
  const API = window.location.origin;

  function showLogin() {
    const rv = document.getElementById('resultsView');
    const lv = document.getElementById('loginView');
    rv.style.display = 'none';
    lv.style.display = 'flex';
    lv.classList.add('fade-in');
  }

  function showResults() {
    const lv = document.getElementById('loginView');
    const rv = document.getElementById('resultsView');
    lv.style.display = 'none';
    rv.style.display = 'block';
    rv.classList.add('fade-in');
  }

  function showError(msg) {
    const el = document.getElementById('loginError');
    document.getElementById('loginErrorMsg').textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('loginError').classList.remove('visible');
  }

  function setLoading(on) {
    const btn = document.getElementById('lookupBtn');
    if (on) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span><span>Looking up...</span>';
    } else {
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="arrow-right"></i><span>View Reports</span>';
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }
  }

  function getInitials(name) {
    if (!name) return '?';
    const parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0][0].toUpperCase();
    return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
  }

  function scoreColor(score) {
    if (score >= 8) return '#2d8a5e';
    if (score >= 6) return '#09A1A1';
    if (score >= 4) return '#b87a3d';
    return '#e05a6b';
  }

  function buildScoreRing(score) {
    if (score == null) return '';
    const max = 10;
    const r = 26;
    const circumference = 2 * Math.PI * r;
    const pct = Math.min(score / max, 1);
    const offset = circumference * (1 - pct);
    const color = scoreColor(score);

    return `
      <div class="score-area">
        <div class="score-ring">
          <svg viewBox="0 0 64 64">
            <circle class="bg-ring" cx="32" cy="32" r="${r}" />
            <circle class="fg-ring" cx="32" cy="32" r="${r}"
              stroke="${color}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}" />
          </svg>
          <div class="score-value">
            <span class="score-number" style="color:${color}">${score.toFixed(1)}</span>
            <span class="score-label">Score</span>
          </div>
        </div>
      </div>
    `;
  }

  function buildTrend(scores) {
    if (!scores || scores.length < 2) return '';
    const items = scores.slice(-3);
    let html = '<div class="trend-section"><div class="trend-label">Recent Trend</div><div class="trend-track">';
    items.forEach((s, i) => {
      if (i > 0) html += '<div class="trend-line"></div>';
      const isFilled = i === items.length - 1;
      html += `
        <div class="trend-dot-wrap">
          <div class="trend-dot ${isFilled ? 'filled' : ''}" title="${s.toFixed(1)}"></div>
          <span style="font-size:10px;font-weight:700;color:${scoreColor(s)};margin-top:2px">${s.toFixed(1)}</span>
        </div>
      `;
    });
    html += '</div></div>';
    return html;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch {
      return dateStr;
    }
  }

  function buildEmptyState() {
    return `
      <div class="empty-state fade-in">
        <div class="empty-icon"><i data-lucide="file-search"></i></div>
        <h3>No reports found</h3>
        <p>We couldn't find any evaluation reports for this email address. Please check the email you used during registration.</p>
      </div>
    `;
  }

  function buildPlayerCards(reports) {
    // Group by player name
    const groups = {};
    reports.forEach(r => {
      const name = r.player_name || 'Unknown Player';
      if (!groups[name]) groups[name] = [];
      groups[name].push(r);
    });

    const playerNames = Object.keys(groups);
    let html = '';

    playerNames.forEach(name => {
      const playerReports = groups[name];
      // Sort by date descending
      playerReports.sort((a, b) => {
        if (!a.event_date || !b.event_date) return 0;
        return new Date(b.event_date) - new Date(a.event_date);
      });

      if (playerNames.length > 1) {
        html += `<div class="player-group-label">${name}</div>`;
      }

      // Collect scores for trend
      const allScores = playerReports
        .filter(r => r.overall_score != null)
        .map(r => r.overall_score)
        .reverse(); // oldest first for trend

      playerReports.forEach((r, idx) => {
        const latest = r;
        const avatarBg = [
          'linear-gradient(135deg, #09A1A1, #5484A4)',
          'linear-gradient(135deg, #5484A4, #ACC0D3)',
          'linear-gradient(135deg, #FA6E82, #D396A6)',
          'linear-gradient(135deg, #F6C992, #FA6E82)',
        ];
        const bgStyle = avatarBg[playerNames.indexOf(name) % avatarBg.length];

        html += `<div class="player-card fade-in" style="animation-delay:${idx * 0.07}s">`;
        html += '<div class="card-top">';

        // Avatar
        if (latest.photo_url) {
          html += `<div class="avatar"><img src="${latest.photo_url}" alt="${name}" onerror="this.parentElement.textContent='${getInitials(name)}'"></div>`;
        } else {
          html += `<div class="avatar" style="background:${bgStyle}">${getInitials(name)}</div>`;
        }

        // Info + badges
        html += '<div class="card-info">';
        html += `<div class="player-name">${name}</div>`;
        html += '<div class="badges">';
        if (latest.position) {
          html += `<span class="badge badge-position"><i data-lucide="shirt"></i>${latest.position}</span>`;
        }
        if (latest.age_group) {
          html += `<span class="badge badge-age"><i data-lucide="users"></i>${latest.age_group}</span>`;
        }
        if (latest.rank && latest.total_players) {
          html += `<span class="badge badge-rank"><i data-lucide="medal"></i>${latest.rank} of ${latest.total_players}</span>`;
        }
        html += '</div></div>';

        // Score ring
        html += buildScoreRing(latest.overall_score);
        html += '</div>';

        // Event row
        html += '<div class="event-row">';
        html += '<div class="event-info">';
        html += '<i data-lucide="calendar"></i>';
        html += '<div>';
        if (latest.event_name) html += `<span class="event-name">${latest.event_name}</span><br>`;
        html += `<span class="event-date">${formatDate(latest.event_date)}</span>`;
        html += '</div></div>';
        if (latest.report_url) {
          html += `<a href="${latest.report_url}" target="_blank" class="view-report-btn">
            <i data-lucide="file-text"></i>View Report
          </a>`;
        }
        html += '</div>';

        // Trend (only on first card for this player)
        if (idx === 0 && allScores.length >= 2) {
          html += buildTrend(allScores);
        }

        html += '</div>';
      });
    });

    return html;
  }

  // ═══ PARENT PORTAL: Programs, Messages, Videos ═══
  async function loadParentPrograms(playerId) {
    var section = document.getElementById('parentProgramsSection');
    var list = document.getElementById('parentProgramsList');
    try {
      var resp = await fetch(API + '/api/players/' + playerId + '/programs', {headers:{'X-Admin-Key':'parent-access'}});
      if (!resp.ok) { section.style.display = 'none'; return; }
      var programs = await resp.json();
      if (!programs.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = programs.map(function(p) {
        var statusColor = p.status === 'active' ? '#2d8a5e' : p.status === 'completed' ? '#5484A4' : '#e8b06e';
        var html = '<div style="background:#fff;border-radius:12px;border:1px solid #e8ecf0;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">';
        html += '<strong style="font-size:15px;color:#333;">' + (p.template_name || 'Training Program') + '</strong>';
        html += '<span style="padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:' + statusColor + '22;color:' + statusColor + ';">' + (p.status || 'draft') + '</span>';
        html += '</div>';
        html += '<div style="font-size:13px;color:#666;">' + (p.sport || '') + ' · ' + (p.phase_name || '') + ' · ' + (p.duration_weeks || 0) + ' weeks' + (p.ai_generated ? ' · <span style="color:#09A1A1;">AI Generated</span>' : '') + '</div>';
        if (p.weeks && p.weeks.length) {
          html += '<div style="margin-top:10px;">';
          p.weeks.forEach(function(w) {
            html += '<div style="padding:8px 12px;margin:4px 0;background:#f8f9fa;border-radius:8px;border-left:3px solid #09A1A1;">';
            html += '<strong style="font-size:13px;">Week ' + w.week_number + ':</strong> ' + (w.focus || 'General');
            if (w.sessions && w.sessions.length) {
              html += '<div style="margin-top:4px;font-size:12px;color:#666;">' + w.sessions.length + ' session(s): ' + w.sessions.map(function(s){return s.day_of_week;}).join(', ') + '</div>';
            }
            html += '</div>';
          });
          html += '</div>';
        }
        html += '</div>';
        return html;
      }).join('');
    } catch(e) { section.style.display = 'none'; }
  }

  async function loadParentMessages(playerId) {
    var section = document.getElementById('parentMessagesSection');
    var list = document.getElementById('parentMessagesList');
    try {
      var resp = await fetch(API + '/api/players/' + playerId + '/threads', {headers:{'X-Admin-Key':'parent-access'}});
      if (!resp.ok) { section.style.display = 'none'; return; }
      var threads = await resp.json();
      if (!threads.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = threads.map(function(t) {
        var typeColors = {direct:'#09A1A1',team:'#5484A4',announcement:'#FA6E82'};
        var c = typeColors[t.thread_type] || '#888';
        return '<div style="background:#fff;border-radius:12px;border:1px solid #e8ecf0;padding:14px;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">' +
          '<div style="display:flex;justify-content:space-between;align-items:center;">' +
          '<strong style="font-size:14px;color:#333;">' + (t.title || 'Message Thread') + '</strong>' +
          '<span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;background:' + c + '22;color:' + c + ';">' + (t.thread_type || 'direct') + '</span>' +
          '</div>' +
          '<div style="font-size:12px;color:#888;margin-top:4px;">' + (t.participants ? t.participants.length : 0) + ' participants' + (t.last_message_at ? ' · Last message: ' + new Date(t.last_message_at).toLocaleDateString() : '') + '</div>' +
          '</div>';
      }).join('');
    } catch(e) { section.style.display = 'none'; }
  }

  async function loadParentVideos(playerId) {
    var section = document.getElementById('parentVideosSection');
    var list = document.getElementById('parentVideosList');
    try {
      var resp = await fetch(API + '/api/players/' + playerId + '/videos', {headers:{'X-Admin-Key':'parent-access'}});
      if (!resp.ok) { section.style.display = 'none'; return; }
      var videos = await resp.json();
      if (!videos.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      list.innerHTML = videos.map(function(v) {
        return '<div style="background:#fff;border-radius:12px;border:1px solid #e8ecf0;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.04);">' +
          '<div style="height:120px;background:linear-gradient(135deg,#09A1A1,#5484A4);display:flex;align-items:center;justify-content:center;">' +
          (v.thumbnail_data ? '<img src="data:image/jpeg;base64,' + v.thumbnail_data + '" style="width:100%;height:100%;object-fit:cover;">' : '<i data-lucide="video" style="width:36px;height:36px;color:white;"></i>') +
          '</div>' +
          '<div style="padding:12px;">' +
          '<strong style="font-size:14px;color:#333;">' + (v.title || 'Video') + '</strong>' +
          '<div style="font-size:12px;color:#888;margin-top:4px;">' + (v.duration_seconds ? Math.round(v.duration_seconds) + 's' : '') + (v.created_at ? ' · ' + new Date(v.created_at).toLocaleDateString() : '') + '</div>' +
          (v.ai_analysis ? '<div style="margin-top:8px;padding:8px;background:#e6f7f7;border-radius:6px;font-size:12px;color:#333;max-height:60px;overflow:hidden;">' + v.ai_analysis.substring(0,120) + '...</div>' : '') +
          '</div></div>';
      }).join('');
    } catch(e) { section.style.display = 'none'; }
  }

  var _parentPlayerIds = [];

  async function handleLookup() {
    hideError();
    const email = document.getElementById('emailInput').value.trim();
    if (!email) {
      showError('Please enter your email address.');
      return;
    }

    setLoading(true);

    try {
      const resp = await fetch(API + '/api/parent/reports?email=' + encodeURIComponent(email));
      if (!resp.ok) throw new Error('Not found');
      const raw = await resp.json();
      const data = raw.reports || raw || [];

      if (!data.length) {
        showResults();
        document.getElementById('welcomeText').textContent = 'Welcome';
        document.getElementById('reportCount').textContent = 'No reports found';
        document.getElementById('resultsBody').innerHTML = buildEmptyState();
        if (typeof lucide !== 'undefined') lucide.createIcons();
        setLoading(false);
        return;
      }

      // Determine a greeting
      const firstName = data[0].player_name ? data[0].player_name.split(' ')[0] : '';
      const uniquePlayers = [...new Set(data.map(r => r.player_name || 'Player'))];

      showResults();
      document.getElementById('welcomeText').textContent = firstName
        ? `${firstName}'s Evaluations`
        : 'Your Evaluations';
      document.getElementById('reportCount').textContent =
        `${data.length} report${data.length !== 1 ? 's' : ''} across ${uniquePlayers.length} player${uniquePlayers.length !== 1 ? 's' : ''}`;

      document.getElementById('resultsBody').innerHTML = buildPlayerCards(data);
      if (typeof lucide !== 'undefined') lucide.createIcons();

      // Load programs, messages, videos for each player
      const playerIds = [...new Set(data.filter(r => r.player_id).map(r => r.player_id))];
      if (playerIds.length > 0) {
        loadParentPrograms(playerIds[0]);
        loadParentMessages(playerIds[0]);
        loadParentVideos(playerIds[0]);
      }
    } catch (e) {
      showError('Could not find reports for this email. Please double-check and try again.');
    }

    setLoading(false);
  }

  // Init icons
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') lucide.createIcons();
    document.getElementById('emailInput').focus();
  });
</script>
