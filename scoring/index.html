<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>TBM Evaluator - Scoring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/score/static/scoring.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>

  <!-- ====== Login Screen ====== -->
  <div id="screen-login" class="screen active">
    <div class="login-container">
      <div class="login-card">
        <div class="logo">
          <div class="logo-icon">
            <i data-lucide="clipboard-check" style="width:36px;height:36px;stroke:white;"></i>
          </div>
          <h1>TBM Evaluator</h1>
          <p class="subtitle">Enter your 6-character access code to begin</p>
        </div>
        <form id="login-form" autocomplete="off">
          <div class="input-group">
            <i data-lucide="key-round" class="input-icon"></i>
            <input
              type="text"
              id="access-code-input"
              maxlength="6"
              minlength="6"
              placeholder="ACCESS CODE"
              autocomplete="off"
              autocapitalize="characters"
              spellcheck="false"
              required
            >
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-btn">
            <i data-lucide="log-in" style="width:18px;height:18px;"></i>
            Sign In
          </button>
          <div id="login-error" class="error-msg hidden"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- ====== Event Selection Screen ====== -->
  <div id="screen-events" class="screen">
    <header class="top-bar">
      <button class="btn-icon" id="logout-btn" aria-label="Logout">
        <i data-lucide="log-out" style="width:22px;height:22px;"></i>
      </button>
      <h2 class="top-bar-title">Select Event</h2>
      <div class="top-bar-spacer"></div>
    </header>
    <div class="screen-body">
      <div class="evaluator-badge" id="evaluator-badge"></div>
      <div id="events-list" class="card-list"></div>
      <div id="events-empty" class="empty-state hidden">
        <div class="empty-state-icon">
          <i data-lucide="calendar-off" style="width:48px;height:48px;stroke:#ACC0D3;"></i>
        </div>
        <p>No active events assigned to you.</p>
      </div>
    </div>
  </div>

  <!-- ====== Player List Screen ====== -->
  <div id="screen-players" class="screen">
    <header class="top-bar">
      <button class="btn-icon" id="back-to-events-btn" aria-label="Back">
        <i data-lucide="chevron-left" style="width:22px;height:22px;"></i>
      </button>
      <h2 class="top-bar-title" id="event-title">Players</h2>
      <button class="btn-icon" id="sync-btn" aria-label="Sync scores">
        <i data-lucide="refresh-cw" style="width:22px;height:22px;"></i>
      </button>
    </header>
    <div class="screen-body">
      <!-- Offline indicator -->
      <div id="offline-indicator" class="offline-indicator hidden"></div>

      <!-- Tab bar -->
      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn active" data-tab="players">
          <i data-lucide="users" style="width:16px;height:16px;"></i>
          Players
        </button>
        <button class="tab-btn" data-tab="checkin">
          <i data-lucide="user-check" style="width:16px;height:16px;"></i>
          Check-In
        </button>
        <button class="tab-btn" data-tab="voice">
          <i data-lucide="mic" style="width:16px;height:16px;"></i>
          Voice
        </button>
      </div>

      <!-- Search -->
      <div class="search-bar">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="player-search" placeholder="Search players..." autocomplete="off">
      </div>

      <!-- Progress -->
      <div class="progress-bar-container">
        <div class="progress-bar" id="scoring-progress"></div>
        <span class="progress-label" id="progress-label">0 / 0 scored</span>
      </div>

      <!-- Players tab -->
      <div id="tab-players" class="tab-content active">
        <div id="players-list" class="card-list"></div>
      </div>

      <!-- Check-In tab -->
      <div id="tab-checkin" class="tab-content">
        <div id="checkin-list" class="card-list"></div>
      </div>

      <!-- Voice tab -->
      <div id="tab-voice" class="tab-content">
        <div class="voice-container">
          <div class="voice-header">
            <i data-lucide="mic" style="width:20px;height:20px;stroke:var(--teal);"></i>
            <span>Voice Scoring</span>
          </div>
          <p class="voice-hint">Speak or type natural language scores. Example: "Marcus dribbling 4, passing 2, great attitude"</p>
          <textarea id="voice-input" class="voice-textarea" rows="4" placeholder="Type or use voice-to-text..."></textarea>
          <div class="voice-actions">
            <button class="btn btn-outline" id="voice-record-btn">
              <i data-lucide="mic" style="width:16px;height:16px;"></i>
              Start Voice
            </button>
            <button class="btn btn-primary" id="voice-parse-btn">
              <i data-lucide="wand-2" style="width:16px;height:16px;"></i>
              Parse Scores
            </button>
          </div>
          <div id="voice-results" class="voice-results hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== Scoring Form Screen ====== -->
  <div id="screen-scoring" class="screen">
    <header class="top-bar">
      <button class="btn-icon" id="back-to-players-btn" aria-label="Back">
        <i data-lucide="chevron-left" style="width:22px;height:22px;"></i>
      </button>
      <h2 class="top-bar-title" id="player-name-title">Player</h2>
      <div class="top-bar-spacer"></div>
    </header>
    <div class="screen-body">
      <!-- Player photo + info -->
      <div class="scoring-player-header" id="scoring-player-header"></div>

      <!-- Player navigation -->
      <div class="player-nav">
        <button class="btn btn-outline btn-nav" id="prev-player-btn">
          <i data-lucide="chevron-left" style="width:18px;height:18px;"></i>
          Prev
        </button>
        <span class="player-counter" id="player-counter">1 / 1</span>
        <button class="btn btn-outline btn-nav" id="next-player-btn">
          Next
          <i data-lucide="chevron-right" style="width:18px;height:18px;"></i>
        </button>
      </div>

      <!-- Skills form -->
      <div id="skills-form" class="skills-form"></div>

      <!-- General notes -->
      <div class="general-notes-section">
        <div class="general-notes-header">
          <i data-lucide="message-square" style="width:18px;height:18px;stroke:var(--steel-blue);"></i>
          <h4>General Notes</h4>
        </div>
        <textarea id="general-notes-input" class="general-notes-textarea" placeholder="Overall impressions, attitude, coachability notes..." rows="3"></textarea>
      </div>

      <!-- Submit -->
      <button class="btn btn-primary btn-full btn-submit" id="submit-scores-btn">
        <i data-lucide="send" style="width:20px;height:20px;"></i>
        Submit Scores
      </button>
    </div>
  </div>

  <!-- Toast notification -->
  <div id="toast" class="toast hidden"></div>

  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="spinner"></div>
  </div>

  <script src="/score/static/scoring.js"></script>
  <script>if(typeof lucide!=="undefined")lucide.createIcons();</script>
</body>
</html>
